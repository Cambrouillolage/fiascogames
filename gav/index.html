<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GAV - Page en preparation</title>
  <link rel="icon" type="image/png" href="../assets/GAV1.png" />
  <style>
    :root {
      --bg: #f7f2e8;
      --ink: #1b1b1b;
      --paper: #fffaf1;
      --line: #2b2b2b;
      --accent: #bb1e10;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(0, 0, 0, 0.08), transparent),
        radial-gradient(900px 500px at 85% 100%, rgba(187, 30, 16, 0.12), transparent),
        var(--bg);
    }

    .card {
      width: min(720px, 100%);
      background: var(--paper);
      border: 2px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      line-height: 1.15;
    }

    p {
      margin: 0 0 20px;
      font-size: 1rem;
      opacity: 0.9;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      text-align: center;
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 700;
      color: #fff;
      background: #202020;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    .btn.police {
      background: var(--accent);
    }

    .small {
      margin-top: 16px;
      font-size: 0.92rem;
      opacity: 0.75;
    }

    @media (min-width: 640px) {
      .actions {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Page en preparation</h1>
    <p>Le mode GAV arrive bientot.</p>
    <div class="actions">
      <a class="btn police" href="/gav/feuille/">Voir les feuille</a>
    </div>
    <p class="small">Tu peux deja lancer une partie depuis les feuilles interactives.</p>
  </main>
</body>
</html>
